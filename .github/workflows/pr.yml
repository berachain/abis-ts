name: CI

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure package.json has no version field
        run: |
          if node -e "process.exit(require('./package.json').version ? 1 : 0)"; then
            echo "OK: no version in package.json"
          else
            echo "::error::package.json must not have a version field (it is set by CI during publish)"
            exit 1
          fi

      - name: Ensure README exports section is empty
        run: |
          node -e "
            const content = require('fs').readFileSync('README.md', 'utf8');
            const between = content.match(/<!-- exports:start -->([\s\S]*?)<!-- exports:end -->/)?.[1] ?? null;
            if (between === null) { console.error('exports markers missing from README.md'); process.exit(1); }
            if (between.trim()) { console.error('README.md exports section must be empty (tree is generated at publish time)'); process.exit(1); }
            console.log('OK: exports section is empty');
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
