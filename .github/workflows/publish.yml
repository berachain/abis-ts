name: Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - beta
          - release
      version_bump:
        description: "Version bump (patch, minor, major) or exact semver (e.g. 1.2.3)"
        required: true
        type: string
        default: patch
      contracts_ref:
        description: "Branch/tag/SHA for contracts source"
        required: false
        type: string
        default: main
      staking_pools_ref:
        description: "Branch/tag/SHA for staking-pools source"
        required: false
        type: string
        default: main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - run: pnpm install --frozen-lockfile

      - name: Generate ABIs
        run: >-
          pnpm abi:generate
          --ref contracts=${{ inputs.contracts_ref }}
          --ref staking-pools=${{ inputs.staking_pools_ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm test
      - run: pnpm build

      - name: Bump version (beta)
        if: inputs.release_type == 'beta'
        run: |
          BUMP="${{ inputs.version_bump }}"
          if [[ "$BUMP" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            npm version "$BUMP-beta.$(date +%Y%m%d%H%M%S)" --no-git-tag-version
          else
            npm version "pre$BUMP" --preid beta --no-git-tag-version
          fi

      - name: Bump version (release)
        if: inputs.release_type == 'release'
        run: |
          BUMP="${{ inputs.version_bump }}"
          if [[ "$BUMP" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            npm version "$BUMP" --no-git-tag-version
          else
            npm version "$BUMP" --no-git-tag-version
          fi

      - name: Publish to npm
        run: |
          if [ "${{ inputs.release_type }}" = "beta" ]; then
            pnpm publish --access public --tag beta --no-git-checks
          else
            pnpm publish --access public --tag latest --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag and push
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD --tags
